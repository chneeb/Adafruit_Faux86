[env:esp32s3-faux86]
; pioarduino tracks arduino-esp32 3.x (IDF 5.x), matching Arduino IDE 3.3.7.
; The official espressif32 platform still ships arduino-esp32 2.x (IDF 4.4.7)
; which causes early boot crashes with this hardware/codebase.
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino

board_build.f_cpu          = 240000000L
board_build.flash_size     = 16MB
board_build.flash_mode     = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions     = partitions_16MB_fatfs.csv
board_build.filesystem     = fatfs

; USB mode — must match the active INPUT_* define in esp32-faux86.ino.
; The board JSON defaults to ARDUINO_USB_MODE=1 (Hardware CDC); we override
; it here. -U undefines first to suppress the redefinition warning.
;
;   INPUT_USB_HID_ESPUSBHOST (default) / INPUT_USB_HID_TINYUSB:
;     USB-OTG mode (0), CDC off — keyboard on OTG port, Serial on UART.
;     Also uncomment TinyUSB in lib_deps when using INPUT_USB_HID_TINYUSB.
;
;   INPUT_CARDKB:
;     Hardware CDC mode (1), CDC on — Serial on USB CDC.
;     Change both values below to 1.
;
; faux86-remake headers must be visible when compiling Adafruit_Faux86 sources.
; PlatformIO doesn't propagate include paths between libraries automatically.
build_unflags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -I${PROJECT_LIBDEPS_DIR}/${PIOENV}/faux86-remake/src

monitor_speed = 115200

lib_deps =
    adafruit/Adafruit BusIO
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    symlink://../..
    https://github.com/moononournation/Faux86-remake.git
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    https://github.com/tanakamasayuki/EspUsbHost.git
    ; adafruit/Adafruit TinyUSB Library  ; uncomment for INPUT_USB_HID_TINYUSB
