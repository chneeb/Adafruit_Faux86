[env:esp32s3-faux86]
; pioarduino tracks arduino-esp32 3.x (IDF 5.x), matching Arduino IDE 3.3.7.
; The official espressif32 platform still ships arduino-esp32 2.x (IDF 4.4.7)
; which causes early boot crashes with this hardware/codebase.
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino

board_build.f_cpu          = 240000000L
board_build.flash_size     = 16MB
board_build.flash_mode     = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions     = partitions_16MB_fatfs.csv
board_build.filesystem     = fatfs

; ── Display / Input selection ─────────────────────────────────────────────────
; DISPLAY_PARALLEL + INPUT_CARDKB          → USB mode 1/1, Arduino_GFX, XPT2046
; DISPLAY_SPI     + INPUT_USB_HID_ESPUSBHOST → USB mode 0/0, Adafruit_ILI9341, EspUsbHost
; DISPLAY_SPI     + INPUT_BLE              → USB mode 1/1, Adafruit_ILI9341
;   INPUT_BLE: advertises as "THMIC64" (same BLE UUIDs as T-HMI-C64 project),
;   compatible with the T-HMI-C64 Android app. No extra lib_deps needed —
;   BLE is built into arduino-esp32 3.x via NimBLE.
;
; To switch: change the -DDISPLAY_* and -DINPUT_* flags below, update
; ARDUINO_USB_MODE and ARDUINO_USB_CDC_ON_BOOT to match (see table in CLAUDE.md),
; and swap the commented lib_deps lines.
;
; The board JSON defaults to ARDUINO_USB_MODE=1; -U undefines it first to
; suppress the redefinition warning before -D sets the desired value.
;
; faux86-remake headers must be visible when compiling Adafruit_Faux86 sources.
; PlatformIO doesn't propagate include paths between libraries automatically.
build_unflags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDISPLAY_PARALLEL
    -DINPUT_CARDKB
    -I${PROJECT_LIBDEPS_DIR}/${PIOENV}/faux86-remake/src
    "-I${PROJECT_LIBDEPS_DIR}/${PIOENV}/GFX Library for Arduino/src"

monitor_speed = 115200

lib_deps =
    adafruit/Adafruit BusIO
    adafruit/Adafruit GFX Library
    ; adafruit/Adafruit ILI9341                          ; DISPLAY_SPI
    symlink://../..
    https://github.com/moononournation/Faux86-remake.git
    https://github.com/moononournation/Arduino_GFX.git          ; DISPLAY_PARALLEL
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git  ; DISPLAY_PARALLEL
    ; https://github.com/tanakamasayuki/EspUsbHost.git          ; INPUT_USB_HID_ESPUSBHOST
    ; adafruit/Adafruit TinyUSB Library                         ; INPUT_USB_HID_TINYUSB
